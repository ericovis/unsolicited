{{ template "layout" . }}

{{ define "content" }}
<div class="mb-6">
    <a href="/stats" class="text-blue-400 hover:underline text-sm">← Back to Stats</a>
</div>

<div class="flex items-center gap-4 mb-6">
    <span class="text-4xl" id="flag"></span>
    <div>
        <h1 class="text-3xl font-bold text-gray-100">{{ .CountryName }}</h1>
        <p class="text-gray-400">Country code: {{ .CountryCode }} — {{ .Total }} total events</p>
    </div>
</div>

<!-- Filter by type -->
<div class="flex gap-2 mb-6">
    <button onclick="filterEvents('')" id="btn-all" class="px-4 py-2 rounded-lg text-sm bg-blue-600 text-white">All</button>
    <button onclick="filterEvents('form')" id="btn-form" class="px-4 py-2 rounded-lg text-sm bg-gray-700 text-gray-300 hover:bg-gray-600">📝 Forms</button>
    <button onclick="filterEvents('ssh')" id="btn-ssh" class="px-4 py-2 rounded-lg text-sm bg-gray-700 text-gray-300 hover:bg-gray-600">🔑 SSH</button>
    <button onclick="filterEvents('url')" id="btn-url" class="px-4 py-2 rounded-lg text-sm bg-gray-700 text-gray-300 hover:bg-gray-600">🔍 URLs</button>
</div>

<div class="bg-gray-900 rounded-xl border border-gray-800 p-6">
    <h2 class="text-xl font-bold text-gray-200 mb-4">Events from {{ .CountryName }}</h2>
    <div id="country-events">
        <div class="animate-pulse space-y-2">
            <div class="h-10 bg-gray-800 rounded"></div>
            <div class="h-10 bg-gray-800 rounded"></div>
        </div>
    </div>
</div>

<script>
function countryFlag(code) {
    if (!code || code.length !== 2) return '🌐';
    return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
}

document.getElementById('flag').textContent = countryFlag('{{ .CountryCode }}');

let currentType = '';
async function filterEvents(type) {
    currentType = type;
    document.querySelectorAll('[id^="btn-"]').forEach(b => {
        b.className = 'px-4 py-2 rounded-lg text-sm bg-gray-700 text-gray-300 hover:bg-gray-600';
    });
    document.getElementById('btn-'+(type||'all')).className = 'px-4 py-2 rounded-lg text-sm bg-blue-600 text-white';

    let url = '/api/stats/events?country={{ .CountryCode }}&limit=50';
    if (type) url += '&type=' + type;

    const resp = await fetch(url);
    const data = await resp.json();
    renderEvents(data);
}

function renderEvents(data) {
    const target = document.getElementById('country-events');
    const icons = {form:'📝',ssh:'🔑',url:'🔍'};
    if (!data || data.length === 0) {
        target.innerHTML = '<p class="text-gray-500">No events found.</p>';
        return;
    }
    target.innerHTML = '<div class="space-y-1">' + data.map(e => `
        <div class="flex items-center gap-3 p-3 rounded-lg bg-gray-800/30 hover:bg-gray-800/60 transition text-sm">
            <span class="text-lg">${icons[e.event_type]||'❓'}</span>
            <span class="text-gray-500 w-40 shrink-0">${new Date(e.created_at).toLocaleString()}</span>
            <span class="text-gray-400 w-28 shrink-0 font-mono">${e.ip}</span>
            <span class="text-gray-200 flex-1 truncate">${e.summary}</span>
            <div class="flex gap-1 shrink-0">
                ${(e.categories||[]).map(cat => '<span class="px-2 py-0.5 bg-gray-700 text-gray-300 rounded-full text-xs">'+cat+'</span>').join('')}
            </div>
        </div>
    `).join('') + '</div>';
}

// Initial load
filterEvents('');
</script>
{{ end }}
