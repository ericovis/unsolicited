{{ template "layout" . }}

{{ define "content" }}
<div class="text-center py-20">
    <p class="text-6xl mb-4">🔍</p>
    <h1 class="text-3xl font-bold text-gray-200 mb-2">404 — Page Not Found</h1>
    <p class="text-gray-400 mb-6">The page <code class="text-red-400">{{ .Path }}</code> does not exist.</p>
    <a href="/" class="text-blue-400 hover:underline">← Return to home</a>
</div>
{{ end }}
