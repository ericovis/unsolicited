{{ template "layout" . }}

{{ define "content" }}
<div class="mb-6">
    <a href="/stats" class="text-blue-400 hover:underline text-sm">← Back to Stats</a>
</div>

<div class="flex items-center gap-4 mb-6">
    <div>
        <h1 class="text-3xl font-bold text-gray-100">{{ .Name }}</h1>
        <p class="text-gray-400 mt-1">{{ .Description }}</p>
    </div>
    <span class="ml-auto px-3 py-1 rounded-full text-sm font-semibold
        {{ if eq .Severity "critical" }}bg-red-900 text-red-300
        {{ else if eq .Severity "high" }}bg-orange-900 text-orange-300
        {{ else if eq .Severity "medium" }}bg-yellow-900 text-yellow-300
        {{ else }}bg-green-900 text-green-300{{ end }}">
        {{ .Severity }}
    </span>
</div>

<div class="bg-gray-900 rounded-xl border border-gray-800 p-6">
    <h2 class="text-xl font-bold text-gray-200 mb-4">Events in this Category</h2>
    <div id="category-events"
         hx-get="/api/stats/events?category={{ .ID }}&limit=50"
         hx-trigger="load, every 30s"
         hx-swap="innerHTML">
        <div class="animate-pulse space-y-2">
            <div class="h-10 bg-gray-800 rounded"></div>
            <div class="h-10 bg-gray-800 rounded"></div>
        </div>
    </div>
</div>

<script>
function countryFlag(code) {
    if (!code || code.length !== 2) return '🌐';
    return String.fromCodePoint(...[...code.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
}

document.body.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.pathInfo.requestPath.startsWith('/api/stats/events')) {
        try {
            const data = JSON.parse(evt.detail.xhr.responseText);
            const icons = {form:'📝',ssh:'🔑',url:'🔍'};
            if (!data || data.length === 0) {
                evt.detail.target.innerHTML = '<p class="text-gray-500">No events yet.</p>';
                return;
            }
            evt.detail.target.innerHTML = '<div class="space-y-1">' + data.map(e => `
                <div class="flex items-center gap-3 p-3 rounded-lg bg-gray-800/30 hover:bg-gray-800/60 transition text-sm">
                    <span class="text-lg">${icons[e.event_type]||'❓'}</span>
                    <span class="text-gray-500 w-40 shrink-0">${new Date(e.created_at).toLocaleString()}</span>
                    <span class="text-gray-400 w-28 shrink-0 font-mono">${e.ip}</span>
                    <span class="w-6 text-center">${countryFlag(e.country_code)}</span>
                    <span class="text-gray-200 flex-1 truncate">${e.summary}</span>
                </div>
            `).join('') + '</div>';
        } catch(e) {}
    }
});
</script>
{{ end }}
